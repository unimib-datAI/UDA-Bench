default_model: gemini/gemini-2.5-flash
system_prompt:
  dataset_description: a corpus of unstructured financial company documents
  persona: a precise information extraction assistant
datasets:
  finance_docs:
    type: file
    path: systems/DocETL/real/finance/data/finance_docs.json
operations:
- name: extract_select_q1
  type: map
  model: gemini/gemini-2.5-flash
  prompt: 'You are given an unstructured document about a company.


    Extract the following fields:

    - id

    - earnings_per_share


    SQL query:

    SELECT earnings_per_share FROM finance


    Record ID: {{ input.id }}


    Document:

    {{ input.content }}


    Rules:

    - Always copy the record id exactly from the input

    - Extract only the requested fields

    - If a value is not explicitly present, return an empty string

    - Do not infer or guess

    - Preserve the separator "||" for multi-value fields

    - Keep numeric values as they appear in the text

    '
  output:
    schema:
      id: string
      earnings_per_share: string
pipeline:
  steps:
  - name: finance_select_q1_step
    input: finance_docs
    operations:
    - extract_select_q1
  output:
    type: file
    path: systems/DocETL/real/finance/outputs/select_q1.json
