default_model: gemini/gemini-2.5-flash

system_prompt:
  dataset_description: a corpus of unstructured documents about basketball players
  persona: a precise information extraction assistant

datasets:
  player_docs:
    type: file
    path: "systems/DocETL/real/data/player_docs.json"

operations:
  - name: extract_draft_pick_from_doc
    type: map
    model: gemini/gemini-2.5-flash
    prompt: |
      You are given an unstructured document about a basketball player.

      Extract:
      - id: copy the record id exactly
      - draft_pick: the player's NBA draft pick

      Record ID: {{ input.id }}

      Document:
      {{ input.content }}

      Rules:
      - If the player was undrafted, return "undrafted"
      - If the draft pick is not explicitly stated, return an empty string
      - Do not infer beyond the text

    output:
      schema:
        id: string
        draft_pick: string

pipeline:
  steps:
    - name: player_docs_select_q1_step
      input: player_docs
      operations:
        - extract_draft_pick_from_doc

  output:
    type: file
    path: "systems/DocETL/real/outputs/player_docs_select_q1.json"