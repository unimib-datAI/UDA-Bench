default_model: gemini/gemini-2.5-flash

system_prompt:
  dataset_description: a CSV dataset of basketball players with biographical and career fields
  persona: a precise data extraction assistant

datasets:
  player:
    type: file
    path: "Query/Player/player.csv"

operations:
  - name: select_q1
    type: map
    model: gemini/gemini-2.5-flash
    limit: 1
    prompt: |
      You are given one row from the player dataset.

      Return:
      - the row identifier as id
      - the player's draft_pick exactly as written in the row

      Row:
      ID: {{ input.ID }}
      name: {{ input.name }}
      draft_pick: {{ input.draft_pick }}

      Rules:
      - Copy values exactly from the row
      - Do not infer or normalize
      - If a value is empty in the row, return an empty string
    output:
      schema:
        id: string
        draft_pick: string

pipeline:
  steps:
    - name: player_select_q1_step
      input: player
      operations:
        - select_q1
  output:
    type: file
    path: "systems/DocETL/real/outputs/player_select_q1.json"